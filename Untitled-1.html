<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic Cinematic 💖</title>
<style>
body {margin:0;padding:0;font-family:Arial,sans-serif;overflow:hidden;background:#0d0d1a;height:100vh;cursor:none;}
canvas#particles {position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
.container {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background: rgba(255,255,255,0.05); backdrop-filter: blur(12px);
    padding:20px; border-radius:25px; text-align:center; z-index:10;
    width:90%; max-width:380px;
}
h1.romantic-text {
    font-size:clamp(20px,5vw,28px); font-weight:bold;
    background: linear-gradient(90deg,#ff4e50,#fc913a,#ff4e50);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation:textGlow 2s ease-in-out infinite alternate; margin-bottom:20px;
}
@keyframes textGlow {0%{text-shadow:0 0 5px #ff4e50;}100%{text-shadow:0 0 25px #fc913a;}}
.buttons { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; }
button {padding:10px clamp(10px,3vw,25px); border:none; border-radius:30px; font-size:clamp(14px,4vw,16px); cursor:pointer; transition:0.3s;}
.yes {background:#28a745;color:white;}
.no {background:#dc3545;color:white;position:relative;}
button:hover {transform:scale(1.1);}
#result { margin-top:15px; font-size:16px; color:#ff4e50; }
.heart {position:fixed; font-size:20px; pointer-events:none; animation:floatUp 6s linear forwards;}
@keyframes floatUp {0%{transform:translateY(0) scale(1);opacity:0.8;}100%{transform:translateY(-200px) scale(1.5);opacity:0;}}
.floating-message {position:fixed; font-size:20px; pointer-events:none; white-space:nowrap; animation:floatMessage 6s linear forwards;}
@keyframes floatMessage {0%{transform:translateY(100vh); opacity:0;}10%{opacity:1;}100%{transform:translateY(-100px); opacity:0;}}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1 class="romantic-text">Will you say Yes? 💍</h1>
    <div class="buttons">
        <button class="yes" id="yesBtn">Yes ❤️</button>
        <button class="no" id="noBtn">No 💔</button>
    </div>
    <div id="result"></div>
</div>

<audio id="bgMusic">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<audio id="yesSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>
// Canvas particles
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth; canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<200;i++){
    particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, vx:(Math.random()-0.5)*0.7, vy:(Math.random()-0.5)*0.7, color:`hsl(${Math.random()*360},100%,80%)`});
}
function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill();
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();
window.addEventListener("resize",()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});

// No button escape for mobile & PC
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("click",()=>{const x=Math.random()*100-50; const y=Math.random()*80-40; noBtn.style.transform=`translate(${x}px,${y}px)`;});

// Hearts trail mouse/touch
function createHeart(x,y){
    let heart=document.createElement("div"); heart.classList.add("heart"); heart.innerHTML="💖";
    heart.style.left=(x+Math.random()*10-5)+"px"; heart.style.top=(y+Math.random()*10-5)+"px";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(heart); setTimeout(()=>heart.remove(),4000);
}
document.body.addEventListener("mousemove",(e)=>{createHeart(e.clientX,e.clientY);});
document.body.addEventListener("touchmove",(e)=>{createHeart(e.touches[0].clientX,e.touches[0].clientY);});

// Messages
const result=document.getElementById("result");
const messages=["Yaaaay! You made the best choice 😍🎉","💖 Love is in the air!","You're amazing! 💘","This will be unforgettable! 🌟","Happiness overload! 😎💖","💕 Forever together!"];
const bgMusic=document.getElementById("bgMusic");
const yesBtn=document.getElementById("yesBtn");
yesBtn.addEventListener("click",()=>{
    result.style.display="block";
    result.innerHTML=messages[Math.floor(Math.random()*messages.length)];
    document.getElementById("yesSound").play();
    bgMusic.volume=0; bgMusic.play();
    let vol=0; const fade=setInterval(()=>{if(vol<0.7){vol+=0.01; bgMusic.volume=vol;}else clearInterval(fade);},50);
    createFloatingMessages();
});

// Floating messages
function createFloatingMessages(){
    const texts=["💌 I love you!","❤️ Forever!","💖 Together!","🌹 You & Me","✨ Our Story"];
    setInterval(()=>{
        let msg=document.createElement("div"); msg.classList.add("floating-message");
        msg.style.left=Math.random()*(window.innerWidth-100)+"px"; msg.style.fontSize=(Math.random()*20+15)+"px";
        msg.innerHTML=texts[Math.floor(Math.random()*texts.length)];
        document.body.appendChild(msg); setTimeout(()=>msg.remove(),6000);
    },800);
}

// Fireworks on click/touch
function createFireworks(x,y){
    for(let i=0;i<20;i++){
        let f=document.createElement("div"); f.classList.add("firework");
        f.style.left=x+"px"; f.style.top=y+"px";
        const fx=(Math.random()*400-200)+"px"; const fy=(Math.random()*-400-100)+"px";
        f.style.setProperty('--x',fx); f.style.setProperty('--y',fy);
        f.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(f); setTimeout(()=>f.remove(),1200);
    }
}
document.body.addEventListener("click",(e)=>{createFireworks(e.clientX,e.clientY);});
document.body.addEventListener("touchstart",(e)=>{createFireworks(e.touches[0].clientX,e.touches[0].clientY);});
</script>
</body>
</html>
